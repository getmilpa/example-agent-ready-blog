name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    continue-on-error: ${{ matrix.php == '8.4' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Validate composer.json
        run: composer validate --strict
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: PHP syntax
        run: find src tests bin public -name '*.php' -print0 | xargs -0 -n1 php -l >/dev/null
      - name: Code style (family standard, php-cs-fixer dry-run)
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit --testsuite ExampleBlog
      - name: The loop itself (smoke, both paths)
        run: |
          php bin/blog.php --auto-approve | grep -q "PUBLISHED"
          rm -f var/posts.json
          php bin/blog.php --reject | grep -q "still a draft"
